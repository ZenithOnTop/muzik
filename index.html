<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith Muzik - Dashboard</title>
    <style>
        /* RESET & BACKGROUND */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .background-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Pake link lofi-girl biar langsung ada visualnya */
            background: url('https://wallpapercave.com/wp/wp6165507.jpg') no-repeat center center fixed;
            background-size: cover;
            z-index: -1;
        }

        /* CONTAINER TOMBOL DI BAWAH */
        .main-container {
            position: absolute;
            bottom: 40px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px; /* Jarak antar tombol */
            padding: 0 20px;
            box-sizing: border-box;
        }

        /* STYLE SEMUA TOMBOL (UKURAN SAMA PERSIS) */
        .btn-box {
            width: 300px; /* Lebar paten */
            height: 55px;  /* Tinggi paten */
            background: rgba(45, 45, 45, 0.85); /* Warna abu gelap transparan */
            border: 2px solid #00ffff; /* Border Cyan khas Zenith */
            border-radius: 10px;
            color: white;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            transition: 0.3s;
            overflow: hidden;
            box-sizing: border-box;
            font-size: 14px;
            letter-spacing: 1px;
        }

        /* HOVER EFFECT */
        .btn-box:hover {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 15px #00ffff;
            transform: translateY(-3px);
        }

        /* KHUSUS TOMBOL KANAN (INPUT YT) */
        .input-group {
            display: flex;
            background: rgba(30, 30, 30, 0.9);
            border: 2px solid #555; /* Warna border input beda biar variasi */
        }

        .input-group input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 0 15px;
            outline: none;
            width: 60%;
            height: 100%;
        }

        .input-group button {
            width: 40%;
            height: 100%;
            background: #ff0000; /* Merah YouTube */
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .input-group button:hover {
            background: #cc0000;
        }

        /* RESPONSIF HP */
        @media (max-width: 950px) {
            .main-container {
                flex-direction: column;
                bottom: 20px;
            }
            .btn-box {
                width: 90%;
            }
        }
    </style>
</head>
<body>

    <div class="background-container"></div>

    <div class="main-container">
        
        <div class="btn-box">
            ZENITH MUZIK
        </div>

        <a href="https://www.youtube.com/@ZenithMc10" target="_blank" class="btn-box">
            YOUTUBE ZENITH
        </a>

        <div class="btn-box input-group">
            <input type="text" placeholder="YouTube Link..." id="yt-link">
            <button onclick="playAction()">YT PLAY</button>
        </div>

    </div>

    <script>
        function playAction() {
            var link = document.getElementById('yt-link').value;
            if (link) {
                alert("Memutar: " + link);
                // Masukin kodingan player video kamu di sini
            } else {
                alert("Masukin link videonya dulu, Zen!");
            }
        }
    </script>

</body>
</html>
