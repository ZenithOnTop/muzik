<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith Cinematic | Player & Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; overflow: hidden; font-family: 'Poppins', sans-serif; color: white; }
        
        /* Video Background */
        iframe {
            position: absolute; top: 50%; left: 50%;
            width: 100vw; height: 56.25vw;
            transform: translate(-50%, -50%);
            pointer-events: none; border: none;
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.7) 100%);
            z-index: 1;
        }

        /* [NEW] Panel Pembuat & Tombol YT (Kanan Atas) */
        .brand-panel {
            position: absolute;
            top: 20px; right: 20px;
            z-index: 10;
            text-align: right;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 242, 255, 0.2);
            transition: 0.3s;
        }
        .brand-panel:hover { background: rgba(255, 255, 255, 0.1); border-color: #00f2ff; }
        .brand-panel h2 { font-family: 'Orbitron', sans-serif; font-size: 0.6rem; letter-spacing: 3px; color: #00f2ff; margin-bottom: 5px; }
        .brand-panel h1 { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; font-weight: 700; margin-bottom: 10px; text-shadow: 0 0 10px #00f2ff; }
        .yt-link {
            display: inline-flex; align-items: center; gap: 8px;
            text-decoration: none; color: #fff; background: #ff0000;
            padding: 8px 15px; border-radius: 8px; font-size: 0.7rem;
            font-weight: bold; font-family: 'Orbitron', sans-serif;
            transition: 0.3s;
        }
        .yt-link:hover { transform: scale(1.05); background: #fff; color: #ff0000; }

        /* Panel Lirik (Kiri) */
        .lyrics-panel {
            position: absolute; left: 0; top: 0; width: 350px; height: 100%;
            z-index: 10; padding: 60px 30px; background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(15px); border-right: 1px solid rgba(255, 255, 255, 0.1);
        }
        .lyrics-header { color: #00f2ff; font-size: 0.7rem; letter-spacing: 3px; margin-bottom: 20px; text-transform: uppercase; font-weight: 600; }
        textarea#lyricsInput { background: transparent; border: none; color: #fff; font-size: 1.1rem; line-height: 1.8; height: 85%; width: 100%; resize: none; outline: none; font-family: 'Poppins', sans-serif; }

        /* Control Input (Kanan Bawah) */
        .ui-bottom {
            position: absolute; bottom: 20px; right: 20px;
            z-index: 10; display: flex; flex-direction: column; align-items: flex-end; gap: 10px;
        }
        .input-group { display: flex; gap: 5px; }
        input#videoID { background: rgba(0, 0, 0, 0.7); border: 1px solid rgba(0, 242, 255, 0.3); color: white; padding: 10px; border-radius: 5px; width: 250px; outline: none; font-size: 0.8rem; }
        button { background: #00f2ff; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <div class="brand-panel">
        <h2>CREATED BY</h2>
        <h1>ZENITH</h1>
        <a href="https://www.youtube.com/@zenithmc10" target="_blank" class="yt-link">
            VISIT YOUTUBE
        </a>
    </div>

    <div class="lyrics-panel">
        <div class="lyrics-header">LYRICS MODE</div>
        <textarea id="lyricsInput" placeholder="Paste lirik di sini..."></textarea>
    </div>

    <iframe id="videoPlayer" src="https://www.youtube.com/embed/jfKfPfyJRdk?autoplay=1&mute=1&controls=0&loop=1&playlist=jfKfPfyJRdk" allow="autoplay"></iframe>

    <div class="ui-bottom">
        <div class="input-group">
            <input type="text" id="videoID" placeholder="Paste YouTube Link...">
            <button onclick="changeTrack()">PLAY</button>
        </div>
    </div>

    <script>
        function changeTrack() {
            const input = document.getElementById('videoID').value;
            let id = "";
            if (input.includes("v=")) { id = input.split('v=')[1].split('&')[0]; }
            else if (input.includes("youtu.be/")) { id = input.split('youtu.be/')[1].split('?')[0]; }
            else { id = input; }

            if(id) {
                const newSrc = `https://www.youtube.com/embed/${id}?autoplay=1&controls=0&loop=1&playlist=${id}`;
                document.getElementById('videoPlayer').src = newSrc;
                document.getElementById('lyricsInput').value = "";
            }
        }
    </script>
</body>
</html>
