<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith Muzik - Dashboard</title>
    <style>
        /* CSS UNTUK TAMPILAN */
        body {
            margin: 0;
            padding: 0;
            background: url('background-lofi.jpg') no-repeat center center fixed; /* Ganti dengan file bg kamu */
            background-size: cover;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* Biar tombol di bawah */
        }

        /* Container Tombol */
        .button-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px; /* Jarak antar tombol */
            padding-bottom: 40px; /* Jarak dari bawah layar */
            width: 100%;
        }

        /* Base Style untuk SEMUA Tombol (Ukuran Sama Persis) */
        .custom-btn {
            width: 280px;  /* Lebar seragam */
            height: 55px;  /* Tinggi seragam */
            border-radius: 10px;
            border: 2px solid #00ffff; /* Border Cyan */
            background: rgba(0, 0, 0, 0.7);
            color: white;
            font-weight: bold;
            text-decoration: none;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-sizing: border-box;
            font-size: 14px;
            letter-spacing: 1px;
        }

        /* Efek Hover Umum */
        .custom-btn:hover {
            background: #00ffff;
            color: black;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.6);
            transform: translateY(-3px);
        }

        /* Style Khusus Link Youtube (Tengah) */
        .btn-center {
            border-color: #00ffff;
        }

        /* Style Khusus Input YT (Kanan) */
        .input-group {
            display: flex;
            overflow: hidden;
            padding: 0;
            border-color: #444;
        }

        .input-group input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding-left: 15px;
            outline: none;
            width: 60%;
            height: 100%;
        }

        .input-group button {
            background: #ff0000; /* Merah YouTube */
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            width: 40%;
            height: 100%;
            transition: 0.3s;
        }

        .input-group button:hover {
            background: #cc0000;
        }

        /* Responsif buat HP biar gak hancur */
        @media (max-width: 900px) {
            .button-container {
                flex-direction: column;
                gap: 10px;
            }
            .custom-btn {
                width: 90%; /* Kalau di HP jadi lebar */
            }
        }
    </style>
</head>
<body>

    <div class="button-container">
        
        <div class="custom-btn">
            ZENITH MUZIK
        </div>

        <a href="https://www.youtube.com/@ZenithMc10" target="_blank" class="custom-btn btn-center">
            YOUTUBE ZENITH
        </a>

        <div class="input-group custom-btn">
            <input type="text" placeholder="YouTube Link..." id="yt-url">
            <button onclick="playVideo()">YT PLAY</button>
        </div>

    </div>

    <script>
        // Logika simpel buat tombol YT Play
        function playVideo() {
            const url = document.getElementById('yt-url').value;
            if(url) {
                alert('Memutar video dari: ' + url);
                // Tambahin logika player kamu di sini
            } else {
                alert('Masukin dulu link YT-nya, Zen!');
            }
        }
    </script>

</body>
</html>
